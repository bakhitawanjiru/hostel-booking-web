<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms | Royal Crest Hostel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<section class="rooms-page">

    <div class="rooms-header">
        <div class="header-text">
            <span>OUR ROOMS</span>
            <h1>Comfortable spaces made for students.</h1>
            <p>
                Choose from our affordable room options designed
                for comfort, security and study.
            </p>
        </div>

        <img src="images/hostel-room.png" alt="Hostel room">
    </div>

    <div class="filter-bar">

        <select>
            <option>Room Type</option>
            <option>Single Room</option>
            <option>Double Room</option>
            <option>Dormitory</option>
        </select>

        <select>
            <option>Occupancy</option>
            <option>1 Student</option>
            <option>2 Students</option>
            <option>4 Students</option>
        </select>

        <select>
            <option>Price</option>
            <option>Lowest</option>
            <option>Highest</option>
        </select>

    </div>


    <div class="room-card">

        <img src="images/dorm.jpg" alt="Dormitory room">

        <div class="room-info">

            <h2>4 Bed Dormitory (AC)</h2>

            <p>
                Spacious shared room with lockers,
                study desks and high-speed Wi-Fi.
            </p>

            <div class="features">
                <span>📶 WiFi</span>
                <span>🔒 Lockers</span>
                <span>📚 Study Desk</span>
                <span>❄ AC</span>
            </div>

        </div>

        <div class="price">

            <h2>KSh 8,500</h2>

            <small>per month</small>

            <button>View Details</button>

        </div>

    </div>

</section>
</body>
</html>
